<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Sprite Sheet Packer</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f5f5f5;
    color: #222;
  }
  .box {
    background: white;
    border: 1px solid #ccc;
    padding: 15px;
    margin-bottom: 20px;
  }
  input, button { margin: 5px 0; padding: 8px; }
  button { cursor: pointer; }
  canvas {
    border: 1px solid #ccc;
    max-width: 100%;
    image-rendering: pixelated;
  }
  #xmlPreview {
    background: #eee;
    padding: 10px;
    white-space: pre-wrap;
    max-height: 200px;
    overflow: auto;
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>

<body>

<h1>Sprite Sheet Packer</h1>

<div class="box">
  <input type="file" id="fileInput" multiple accept="image/*">
  <br><br>

  <!-- NEW: XML loader -->
  <label>Load XML</label><br>
  <input type="file" id="xmlInput" accept=".xml">
  <br><br>

  <label>Sheet Name</label><br>
  <input type="text" id="sheetName" value="spritesheet">

  <br>
  <label>Padding</label><br>
  <input type="number" id="padding" value="2">

  <br><br>
  <button id="packBtn">Pack Sprite Sheet</button>
  <button id="downloadPngBtn" disabled>Download PNG</button>
  <button id="downloadXmlBtn" disabled>Download XML</button>
  <button id="downloadBothBtn" disabled>Download ZIP</button>
  <button id="clearBtn">Clear</button>
</div>

<div class="box">
  <h3>Images</h3>
  <ul id="imageList"></ul>
</div>

<div class="box">
  <h3>Preview</h3>
  <canvas id="previewCanvas"></canvas>
</div>

<div class="box">
  <h3>XML</h3>
  <pre id="xmlPreview"></pre>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const xmlInput = document.getElementById('xmlInput');
const imageList = document.getElementById('imageList');
const previewCanvas = document.getElementById('previewCanvas');
const xmlPreview = document.getElementById('xmlPreview');

let frames = [];
let packedXml = "";

/* ---------------- LOAD IMAGES ---------------- */
fileInput.addEventListener('change', e => loadFiles(e.target.files));

function loadFiles(files) {
  Array.from(files).forEach(file => {
    if (!file.type.startsWith('image/')) return;

    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        frames.push({
          name: file.name.replace(/\.[^.]+$/, ''),
          img,
          width: img.width,
          height: img.height
        });
        updateList();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ---------------- LOAD XML (NEW) ---------------- */
xmlInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = ev => {
    const parser = new DOMParser();
    const xml = parser.parseFromString(ev.target.result, "text/xml");

    const nodes = xml.getElementsByTagName("SubTexture");

    frames = [];

    for (let node of nodes) {
      frames.push({
        name: node.getAttribute("name"),
        x: parseInt(node.getAttribute("x")),
        y: parseInt(node.getAttribute("y")),
        width: parseInt(node.getAttribute("width")),
        height: parseInt(node.getAttribute("height")),
        img: null // image not included in XML
      });
    }

    updateList();
    alert("XML loaded! (Images not restored, only layout data)");
  };

  reader.readAsText(file);
});

/* ---------------- UI LIST ---------------- */
function updateList() {
  imageList.innerHTML = '';

  frames.forEach((f, i) => {
    const li = document.createElement('li');
    li.textContent =
      f.name +
      (f.img ? " (image)" : " (xml-only)");

    const btn = document.createElement('button');
    btn.textContent = "Remove";
    btn.onclick = () => {
      frames.splice(i, 1);
      updateList();
    };

    li.appendChild(btn);
    imageList.appendChild(li);
  });
}

/* ---------------- PACK ---------------- */
document.getElementById('packBtn').onclick = () => {
  if (!frames.length) return;

  const padding = +document.getElementById('padding').value || 0;
  const sheetName = document.getElementById('sheetName').value || "spritesheet";

  const cols = Math.ceil(Math.sqrt(frames.length));
  const cellW = Math.max(...frames.map(f => f.width));
  const cellH = Math.max(...frames.map(f => f.height));

  const w = cols * (cellW + padding) + padding;
  const rows = Math.ceil(frames.length / cols);
  const h = rows * (cellH + padding) + padding;

  previewCanvas.width = w;
  previewCanvas.height = h;

  const ctx = previewCanvas.getContext("2d");
  ctx.clearRect(0,0,w,h);

  const xml = [`<TextureAtlas imagePath="${sheetName}.png">`];

  frames.forEach((f, i) => {
    const x = padding + (i % cols) * (cellW + padding);
    const y = padding + Math.floor(i / cols) * (cellH + padding);

    if (f.img) ctx.drawImage(f.img, x, y);

    xml.push(
      `<SubTexture name="${f.name}" x="${x}" y="${y}" width="${f.width}" height="${f.height}"/>`
    );
  });

  xml.push("</TextureAtlas>");

  packedXml = xml.join("\n");
  xmlPreview.textContent = packedXml;

  document.getElementById('downloadPngBtn').disabled = false;
  document.getElementById('downloadXmlBtn').disabled = false;
  document.getElementById('downloadBothBtn').disabled = false;
};

/* ---------------- DOWNLOADS ---------------- */
document.getElementById('downloadPngBtn').onclick = () => {
  const name = document.getElementById('sheetName').value || "spritesheet";
  const a = document.createElement("a");
  a.download = name + ".png";
  a.href = previewCanvas.toDataURL();
  a.click();
};

document.getElementById('downloadXmlBtn').onclick = () => {
  const name = document.getElementById('sheetName').value || "spritesheet";
  const blob = new Blob([packedXml], { type: "text/xml" });

  const a = document.createElement("a");
  a.download = name + ".xml";
  a.href = URL.createObjectURL(blob);
  a.click();
};

/* ---------------- CLEAR ---------------- */
document.getElementById('clearBtn').onclick = () => {
  frames = [];
  packedXml = "";
  updateList();
  xmlPreview.textContent = "";
  previewCanvas.getContext("2d").clearRect(0,0,previewCanvas.width,previewCanvas.height);

  fileInput.value = "";
  xmlInput.value = "";
};
</script>

</body>
</html>
