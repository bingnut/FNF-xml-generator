<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Sprite Sheet Packer</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background: #f5f5f5;
    color: #222;
  }
  h1 {
    margin-bottom: 20px;
  }
  .box {
    background: white;
    border: 1px solid #ccc;
    padding: 15px;
    margin-bottom: 20px;
  }
  input, button {
    margin: 5px 0;
    padding: 8px;
  }
  button {
    cursor: pointer;
  }
  #previewCanvas {
    border: 1px solid #ccc;
    max-width: 100%;
    image-rendering: pixelated;
  }
  #xmlPreview {
    background: #eee;
    padding: 10px;
    white-space: pre-wrap;
    overflow-x: auto;
    max-height: 200px;
  }
  ul {
    padding-left: 20px;
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
<h1>Sprite Sheet Packer</h1>
<div class="box">
  <input type="file" id="fileInput" multiple accept="image/*">
  <br>
  <label>Sheet Name</label><br>
  <input type="text" id="sheetName" value="spritesheet">
  <br>
  <label>Padding</label><br>
  <input type="number" id="padding" value="2">
  <br><br>
  <button id="packBtn">Pack Sprite Sheet</button>
  <button id="downloadPngBtn" disabled>Download PNG</button>
  <button id="downloadXmlBtn" disabled>Download XML</button>
  <button id="downloadBothBtn" disabled>Download ZIP</button>
  <button id="clearBtn">Clear</button>
</div>
<div class="box">
  <h3>Images</h3>
  <ul id="imageList"></ul>
</div>
<div class="box">
  <h3>Preview</h3>
  <canvas id="previewCanvas"></canvas>
</div>
<div class="box">
  <h3>XML</h3>
  <pre id="xmlPreview"></pre>
</div>
<script>
const fileInput = document.getElementById('fileInput');
const imageList = document.getElementById('imageList');
const previewCanvas = document.getElementById('previewCanvas');
const xmlPreview = document.getElementById('xmlPreview');
const packBtn = document.getElementById('packBtn');
const downloadPngBtn = document.getElementById('downloadPngBtn');
const downloadXmlBtn = document.getElementById('downloadXmlBtn');
const downloadBothBtn = document.getElementById('downloadBothBtn');
const clearBtn = document.getElementById('clearBtn');
let frames = [];
let packedXml = '';
fileInput.addEventListener('change', (e) => {
  loadFiles(e.target.files);
});
function loadFiles(files) {
  Array.from(files).forEach(file => {
    if (!file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        frames.push({
          name: file.name.replace(/\.[^.]+$/, ''),
          img: img,
          width: img.width,
          height: img.height
        });
        updateList();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
function updateList() {
  imageList.innerHTML = '';
  frames.forEach((frame, index) => {
    const li = document.createElement('li');
    const text = document.createElement('span');
    text.textContent = frame.name + ' ';
    const removeBtn = document.createElement('button');
    removeBtn.textContent = 'Remove';
    removeBtn.onclick = () => {
      frames.splice(index, 1);
      updateList();
    };
    li.appendChild(text);
    li.appendChild(removeBtn);
    imageList.appendChild(li);
  });
}
packBtn.addEventListener('click', pack);
function pack() {
  if (frames.length === 0) return;
  const padding =
    parseInt(document.getElementById('padding').value) || 0;
  const sheetName =
    document.getElementById('sheetName').value || 'spritesheet';
  const cols = Math.ceil(Math.sqrt(frames.length));
  const rows = Math.ceil(frames.length / cols);
  const cellWidth =
    Math.max(...frames.map(f => f.width));
  const cellHeight =
    Math.max(...frames.map(f => f.height));
  const sheetWidth =
    cols * (cellWidth + padding) + padding;
  const sheetHeight =
    rows * (cellHeight + padding) + padding;
  previewCanvas.width = sheetWidth;
  previewCanvas.height = sheetHeight;
  const ctx = previewCanvas.getContext('2d');
  ctx.clearRect(0, 0, sheetWidth, sheetHeight);
  const xml = [
    `<TextureAtlas imagePath="${sheetName}.png">`
  ];
  frames.forEach((frame, index) => {
    const col = index % cols;
    const row = Math.floor(index / cols);
    const x =
      padding + col * (cellWidth + padding);
    const y =
      padding + row * (cellHeight + padding);
    ctx.drawImage(frame.img, x, y);
    xml.push(
      `  <SubTexture name="${frame.name}" x="${x}" y="${y}" width="${frame.width}" height="${frame.height}"/>`
    );
  });
  xml.push(`</TextureAtlas>`);
  packedXml = xml.join('\n');
  xmlPreview.textContent = packedXml;
  downloadPngBtn.disabled = false;
  downloadXmlBtn.disabled = false;
  downloadBothBtn.disabled = false;
}
downloadPngBtn.addEventListener('click', () => {
  const sheetName =
    document.getElementById('sheetName').value || 'spritesheet';
  const a = document.createElement('a');
  a.download = sheetName + '.png';
  a.href = previewCanvas.toDataURL('image/png');
  a.click();
});
downloadXmlBtn.addEventListener('click', () => {
  const sheetName =
    document.getElementById('sheetName').value || 'spritesheet';
  const blob =
    new Blob([packedXml], { type: 'text/xml' });
  const a = document.createElement('a');
  a.download = sheetName + '.xml';
  a.href = URL.createObjectURL(blob);
  a.click();
});
downloadBothBtn.addEventListener('click', async () => {
  const sheetName =
    document.getElementById('sheetName').value || 'spritesheet';
  const zip = new JSZip();
  const pngData =
    previewCanvas.toDataURL('image/png').split(',')[1];
  zip.file(
    sheetName + '.png',
    pngData,
    { base64: true }
  );
  zip.file(
    sheetName + '.xml',
    packedXml
  );
  const content =
    await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(content);
  a.download = sheetName + '.zip';
  a.click();
});
clearBtn.addEventListener('click', () => {
  frames = [];
  packedXml = '';
  updateList();
  const ctx = previewCanvas.getContext('2d');
  ctx.clearRect(
    0,
    0,
    previewCanvas.width,
    previewCanvas.height
  );
  xmlPreview.textContent = '';
  downloadPngBtn.disabled = true;
  downloadXmlBtn.disabled = true;
  downloadBothBtn.disabled = true;
  fileInput.value = '';
});
</script>
</body>
</html>
